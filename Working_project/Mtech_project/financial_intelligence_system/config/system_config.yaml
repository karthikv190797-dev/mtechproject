# System Configuration (YAML)
system:
  name: "Self-Correcting Financial Intelligence System"
  version: "1.0.0"
  environment: "development"  # development, staging, production
  log_level: "INFO"

# Data Ingestion Configuration
data_ingestion:
  sources:
    sec_filings:
      enabled: true
      type: "sec_edgar"
      cache_dir: "./data/sec_filings"
      update_frequency: "weekly"
      
    snowflake:
      enabled: true
      type: "snowflake"
      connection:
        account: "${SNOWFLAKE_ACCOUNT}"
        user: "${SNOWFLAKE_USER}"
        password: "${SNOWFLAKE_PASSWORD}"
        warehouse: "COMPUTE_WH"
        database: "FINANCIAL_DB"
        schema: "RAW_DATA"
      query_timeout: 300  # seconds
      
    local_files:
      enabled: false
      path: "./data/documents"
      supported_formats: ["pdf", "txt", "json"]

# Retrieval Configuration
retrieval:
  hybrid_retriever:
    enabled: true
    top_k: 10
    alpha: 0.7  # FAISS weight (increase semantic weight)
    beta: 0.3   # BM25 weight (lower sparse weight)
    
  faiss:
    index_type: "IndexFlatL2"
    embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
    embedding_dimension: 384
    batch_size: 32
    
  bm25:
    k1: 1.5
    b: 0.75
    min_df: 2
    max_df: 0.95

# Reasoning Configuration
reasoning:
  teacher_model:
    enabled: true
    model_name: "glm-130b"
    model_type: "ollama"  # ollama, huggingface, openai
    quantization: "int4"
    max_tokens: 2048
    temperature: 0.3
    top_p: 0.9
    
  student_model:
    enabled: true
    model_name: "mistral-7b"
    model_type: "ollama"
    quantization: "int4"
    max_tokens: 1024
    temperature: 0.5
    top_p: 0.9
    
  distillation:
    enabled: true
    temperature: 4.0
    alpha: 0.7  # Loss weight for distillation
    num_epochs: 3
    batch_size: 16
    learning_rate: 1e-5

# Evaluation Configuration
evaluation:
  evaluator:
    enabled: true
    relevance_threshold: 0.7
    confidence_threshold: 0.80
    max_correction_attempts: 3
    
  metrics:
    - relevance
    - factual_consistency
    - numerical_coherence
    - entailment
    - cross_model_verification
    
  scoring:
    relevance_weight: 0.3
    factual_weight: 0.3
    numerical_weight: 0.2
    entailment_weight: 0.2

# Orchestration Configuration
orchestration:
  type: "langgraph"
  max_iterations: 3
  timeout_seconds: 60
  
  agents:
    retriever:
      enabled: true
      retry_attempts: 2
      
    reader:
        enabled: true
        context_window: 6000
      
    reasoning:
      enabled: true
      use_teacher_by_default: false
      
    evaluator:
      enabled: true
      auto_correction: true
      
    verifier:
      enabled: true
      num_models_for_verification: 3  # Use 3 models for better verification in production
      
    correction:
      enabled: true
      strategies: ["query_reformulation", "re_retrieval", "re_ranking", "regeneration"]

# Backend Configuration
backend:
  api:
    enabled: true
    host: "0.0.0.0"
    port: 8000
    workers: 4
    reload: false
    
  cors:
    enabled: true
    allow_origins: ["*"]
    allow_methods: ["GET", "POST", "PUT", "DELETE"]
    allow_credentials: true
    
  cache:
    enabled: true
    backend: "redis"  # memory, redis
    ttl: 3600  # seconds

# Frontend Configuration
frontend:
  streamlit:
    enabled: true
    port: 8501
    theme: "light"
    
  features:
    interactive_query: true
    batch_processing: true
    statistics_dashboard: true
    query_history: true

# Database Configuration
database:
  type: "snowflake"
  connection:
    account: "${SNOWFLAKE_ACCOUNT}"
    user: "${SNOWFLAKE_USER}"
    password: "${SNOWFLAKE_PASSWORD}"
  
  tables:
    queries_log: "queries_log"
    evaluation_metrics: "evaluation_metrics"
    model_performance: "model_performance"

# Logging Configuration
logging:
  level: "INFO"
  format: "json"
  handlers:
    console:
      enabled: true
      level: "INFO"
    
    file:
      enabled: true
      filepath: "./logs/system.log"
      max_size_mb: 100
      backup_count: 5
    
    debug_file:
      enabled: false
      filepath: "./logs/debug.log"

# Monitoring Configuration
monitoring:
  prometheus:
    enabled: true
    port: 9090
    
  metrics:
    - query_latency
    - model_accuracy
    - retrieval_precision
    - evaluator_confidence
    - correction_rate

# Security Configuration
security:
  encryption:
    enabled: true
    algorithm: "AES-256"
    key_file: "./config/encryption.key"
  
  authentication:
    enabled: false
    type: "api_key"  # api_key, oauth2, jwt
    
  data_lineage:
    enabled: true
    track_queries: true
    track_documents: true

# Deployment Configuration
deployment:
  docker:
    enabled: true
    image_name: "financial-intelligence:1.0.0"
    registry: "docker.io"
    
  kubernetes:
    enabled: false
    namespace: "financial-ai"
    replicas: 3
    
  containerization:
    use_compose: true
    compose_file: "docker-compose.yml"

# Advanced Features
advanced:
  fine_tuning:
    enabled: false
    dataset: "financial_qa_dataset"
    epochs: 5
    
  active_learning:
    enabled: false
    uncertainty_sampling: true
    
  explainability:
    enabled: true
    attention_visualization: true
    reasoning_path_tracking: true
    
  privacy:
    differential_privacy: false
    data_anonymization: false
    federated_learning: false
